{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>Register - Fraud Detection System</title>

	<link rel="icon" href="images/icon.png" type="image/x-icon" />
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap"
		rel="stylesheet">

	<style>
		:root {
			--bg-color: #0b0f19;
			--card-bg: rgba(20, 27, 45, 0.7);
			--primary: #3b82f6;
			--primary-hover: #2563eb;
			--text-main: #f8fafc;
			--text-muted: #94a3b8;
			--glass-border: rgba(255, 255, 255, 0.08);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			background-color: var(--bg-color);
			background-image:
				radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15), transparent 40%),
				radial-gradient(circle at 10% 80%, rgba(16, 185, 129, 0.1), transparent 30%);
			font-family: 'Inter', sans-serif;
			color: var(--text-main);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 2rem 0;
			position: relative;
		}

		.ambient-light {
			position: fixed;
			width: 100%;
			height: 100%;
			z-index: -1;
			top: 0;
			left: 0;
			background: url("{% static 'bg.jpg' %}") center/cover no-repeat;
			opacity: 0.1;
			filter: blur(8px);
		}

		.register-container {
			width: 100%;
			max-width: 800px;
			margin: 0 auto;
			animation: fade-in-up 0.8s ease-out;
		}

		.header-section {
			text-align: center;
			margin-bottom: 2rem;
		}

		.header-section h1 {
			font-family: 'Outfit', sans-serif;
			font-size: 2.2rem;
			margin-bottom: 0.5rem;
			background: linear-gradient(to right, #60a5fa, #34d399);
			-webkit-background-clip: text;
			background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.glass-card {
			background: var(--card-bg);
			backdrop-filter: blur(16px);
			-webkit-backdrop-filter: blur(16px);
			border: 1px solid var(--glass-border);
			border-radius: 24px;
			padding: 2.5rem 3rem;
			box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
		}

		.glass-card h2 {
			font-family: 'Outfit', sans-serif;
			font-size: 1.5rem;
			margin-bottom: 2rem;
			color: #fff;
			text-align: center;
		}

		.form-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 1.5rem;
		}

		@media (max-width: 600px) {
			.form-grid {
				grid-template-columns: 1fr;
			}
		}

		.form-group {
			position: relative;
		}

		.form-group input {
			width: 100%;
			padding: 1rem 1.2rem;
			background: rgba(255, 255, 255, 0.03);
			border: 1px solid rgba(255, 255, 255, 0.1);
			border-radius: 12px;
			color: #fff;
			font-size: 0.95rem;
			font-family: 'Inter', sans-serif;
			transition: all 0.3s ease;
			outline: none;
		}

		.form-group input:focus {
			border-color: var(--primary);
			background: rgba(59, 130, 246, 0.05);
			box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
		}

		.btn-primary {
			width: 100%;
			padding: 1rem;
			background: linear-gradient(135deg, var(--primary), #2563eb);
			color: white;
			border: none;
			border-radius: 12px;
			font-size: 1rem;
			font-weight: 600;
			cursor: pointer;
			transition: transform 0.2s, box-shadow 0.2s;
			margin-top: 2rem;
			font-family: 'Outfit', sans-serif;
		}

		.btn-primary:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
		}

		.bottom-links {
			margin-top: 1.5rem;
			text-align: center;
		}

		.bottom-links a {
			color: var(--primary);
			text-decoration: none;
			font-weight: 500;
			transition: color 0.2s;
		}

		.bottom-links a:hover {
			color: #60a5fa;
			text-decoration: underline;
		}

		@keyframes fade-in-up {
			from {
				opacity: 0;
				transform: translateY(30px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>

<body>
	<div class="ambient-light"></div>

	<div class="register-container">
		<div class="header-section">
			<h1>Fraud Detection System</h1>
		</div>

		<div class="glass-card">
			<h2>Register New Account</h2>
			<form role="form" method="POST">
				{% csrf_token %}

				<div class="form-grid">
					<div class="form-group">
						<input type="text" name="username" id="username" placeholder="Username" required
							autocomplete="off">
					</div>
					<div class="form-group">
						<input type="password" name="password" id="password" placeholder="Password" required>
					</div>
					<div class="form-group">
						<input type="email" name="email" id="email" placeholder="Email Address" required>
					</div>
					<div class="form-group">
						<input type="number" name="phoneno" id="phoneno" placeholder="Mobile Number" required>
					</div>
					<div class="form-group">
						<input type="text" name="country" id="country" placeholder="Country" required>
					</div>
					<div class="form-group">
						<input type="text" name="state" id="state" placeholder="State/Province" required>
					</div>
					<div class="form-group" style="grid-column: 1 / -1;">
						<input type="text" name="city" id="city" placeholder="City" required>
					</div>
				</div>

				<input type="submit" name="submit" class="btn-primary" value="Create Account">
			</form>

			<div class="bottom-links">
				Already have an account? <a href="{% url 'login' %}">Sign in here</a>
			</div>
		</div>
	</div>
</body>

</html>
